apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-study-buddy
  namespace: argocd
  labels:
    app: ai-study-buddy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-study-buddy
  template:
    metadata:
      labels:
        app: ai-study-buddy
    spec:
      containers:
        - name: ai-study-buddy
          image: eduardosousa1493/ai-study-buddy:v4
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: groq-api-secret
                  key: GROQ_API_KEY
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20