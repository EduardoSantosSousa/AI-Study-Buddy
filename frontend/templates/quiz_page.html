<body class="bg-background text-on-background min-h-screen font-body-md">
<!-- TopAppBar Shell -->
<header class="fixed top-0 z-50 w-full h-16 flex justify-between items-center px-gutter py-4 bg-surface shadow-[0_4px_20px_0_rgba(84,79,192,0.15)] md:pl-72">
<div class="flex items-center gap-4">
<span class="font-headline-md text-headline-md font-bold text-primary">Study Buddy AI</span>
</div>
<div class="flex items-center gap-4">
<div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-secondary-container/10 border border-secondary/20">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">timer</span>
<span class="font-label-md text-label-md text-secondary" id="timer">14:52</span>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden bg-surface-container-high flex items-center justify-center hover:bg-surface-container-high transition-colors cursor-pointer active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface-variant">account_circle</span>
</div>
</div>
</header>
<!-- SideNavBar Shell -->
<aside class="h-screen w-64 fixed left-0 top-0 hidden md:flex flex-col bg-surface-container-lowest border-r border-outline-variant shadow-[0_4px_20px_0_rgba(84,79,192,0.05)] z-50">
<div class="p-gutter flex flex-col gap-stack-md flex-grow">
<div class="flex items-center gap-3 mb-6">
<div class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary">school</span>
</div>
<div>
<h2 class="font-headline-md text-headline-md font-bold text-primary leading-tight">Study Buddy AI</h2>
<p class="font-label-sm text-label-sm text-on-surface-variant">AI-Powered Tutor</p>
</div>
</div>
<nav class="flex flex-col gap-2">
<a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container-high rounded-lg transition-all duration-200" href="/dashboard">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-label-md text-label-md">Dashboard</span>
</a>
<!-- ACTIVE TAB: My Quizzes -->
<a class="flex items-center gap-3 px-4 py-3 bg-secondary-container text-on-secondary-container rounded-lg font-bold border-2 border-secondary transition-all duration-200 active:scale-[0.98]" href="/quiz">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">quiz</span>
<span class="font-label-md text-label-md">My Quizzes</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container-high rounded-lg transition-all duration-200" href="/performance">
<span class="material-symbols-outlined">analytics</span>
<span class="font-label-md text-label-md">Analytics</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container-high rounded-lg transition-all duration-200" href="/dashboard">

</a>

<button class="mt-6 py-4 px-4 bg-primary text-on-primary rounded-xl font-label-md text-label-md flex items-center justify-center gap-2 hover:bg-primary-container transition-colors active:scale-95" onclick="window.location.href='/dashboard'" type="button">
<span class="material-symbols-outlined">add_circle</span>
                Start New Study Session
            </button>
</div>
<div class="p-gutter border-t border-outline-variant flex flex-col gap-2">
<a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container-high rounded-lg transition-all duration-200" href="/dashboard">
<span class="material-symbols-outlined">help</span>
<span class="font-label-md text-label-md">Help Center</span>
</a>

<span class="material-symbols-outlined">arrow_back</span>
                    Previous
</button>
<div class="flex gap-4">
<button id="nextButton" class="flex items-center gap-2 px-8 py-3 rounded-xl font-label-md text-label-md bg-primary text-on-primary hover:bg-primary-container transition-all active:scale-95 soft-shadow disabled:opacity-50 disabled:cursor-not-allowed">
                        Next
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<button id="submitQuizButton" class="flex items-center gap-2 px-8 py-3 rounded-xl font-label-md text-label-md bg-secondary text-on-secondary hover:bg-secondary-container transition-all active:scale-95 soft-shadow hidden md:flex">
                        Submit Quiz

</button>
</div>
</div>

<span class="font-label-md text-label-md">Submit Quiz</span>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">done_all</span>
</button>

<div id="learningAidSection" class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-stack-lg">

<div class="relative z-10">
<h3 class="font-headline-md text-headline-md mb-2">AI Tutor Tip</h3>
<p id="quizTutorTip" class="font-body-md opacity-90"></p>
</div>
<span class="material-symbols-outlined absolute -bottom-4 -right-4 text-9xl opacity-10 group-hover:scale-110 transition-transform duration-500">lightbulb</span>
</div>
<div class="bg-surface-container-high p-6 rounded-[24px] flex flex-col justify-center items-center text-center">
<span class="material-symbols-outlined text-secondary text-4xl mb-2">auto_awesome</span>
<h4 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">TOTAL</h4>
<p id="quizTotalQuestions" class="font-display-lg text-display-lg text-primary">0</p>
<p class="font-body-sm text-on-surface-variant">Questions in this quiz</p>
</div>
</div>
</div>
</main>
<script>
        // Micro-interaction for Timer
        let seconds = 892; // 14:52
        const timerElement = document.getElementById('timer');
        
        setInterval(() => {
            seconds--;
            if (seconds < 0) seconds = 0;
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            timerElement.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
            
            if (seconds < 60) {
                timerElement.parentElement.classList.add('bg-error-container');
                timerElement.classList.add('text-error');
            }
        }, 1000);

        // Feedback Toast Logic
        function showFeedback() {
            const toast = document.createElement('div');
            toast.className = 'fixed top-4 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 bg-secondary text-on-secondary rounded-full shadow-2xl flex items-center gap-3 animate-bounce';
            toast.innerHTML = `
                <span class="material-symbols-outlined">celebration</span>
                <span class="font-label-md">Answer saved successfully!</span>
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Selection Visual Feedback
        const options = document.querySelectorAll('input[name="quiz-option"]');
        options.forEach(option => {
            option.addEventListener('change', () => {
                showFeedback();
            });
        });
    </script>
